<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Validador de facturas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Servicio serverless</p>
          <h1>Validador de facturas</h1>
        </div>
        <button id="settings-toggle" class="secondary-button" type="button" aria-expanded="false">
          Configuracion
        </button>
      </header>

      <section id="settings-panel" class="settings-panel" hidden>
        <label class="api-field" for="api-url">
          API base
          <input id="api-url" type="url" value="http://127.0.0.1:3000" />
        </label>
      </section>

      <section class="workspace">
        <section class="panel">
          <h2>Subir lote</h2>
          <form id="upload-form" class="form">
            <label for="invoice-file">Archivo Excel</label>
            <input id="invoice-file" type="file" accept=".xlsx" required />
            <button id="upload-button" type="submit">Subir lote</button>
          </form>
          <div id="upload-status" class="notice notice-muted" aria-live="polite">
            Selecciona un archivo Excel para crear un nuevo lote.
          </div>
        </section>

        <section class="panel">
          <h2>Consultar lote</h2>
          <form id="query-form" class="form inline-form">
            <label for="batch-id">Batch ID</label>
            <input id="batch-id" type="text" autocomplete="off" />
            <button id="query-button" type="submit">Consultar</button>
          </form>

          <dl id="batch-summary" class="summary-grid"></dl>
        </section>
      </section>

      <section class="panel full-width">
        <div class="section-head">
          <h2>Facturas</h2>
          <div class="pager">
            <label for="page-size">Por pagina</label>
            <select id="page-size">
              <option value="10" selected>10</option>
              <option value="20">20</option>
              <option value="50">50</option>
            </select>
            <span id="page-indicator" class="page-indicator" aria-live="polite">Pagina 1</span>
            <button id="previous-page-button" type="button" disabled>Anterior</button>
            <button id="next-page-button" type="button" disabled>Siguiente</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Factura</th>
                <th>Estado</th>
                <th>Cliente</th>
                <th>Monto</th>
                <th>CAE</th>
                <th>Errores</th>
              </tr>
            </thead>
            <tbody id="invoices-body">
              <tr>
                <td colspan="6" class="empty">Sin facturas para mostrar</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
